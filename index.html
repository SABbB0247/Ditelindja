<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>HAPPY BIRTHDAY</title>
    <style>
        body { background-color: #E0F7FA; text-align: center; font-family: 'Arial', sans-serif; margin: 0; padding: 20px; color: #01579B; }
        
        #game-container { max-width: 600px; margin: auto; background: white; padding: 40px; border-radius: 50px; box-shadow: 0 30px 60px rgba(0,0,0,0.15); border: 8px solid #B3E5FC; }

        /* Torta Reale */
        .cake-area { position: relative; width: 350px; height: 350px; margin: 40px auto; }

        .layer { position: absolute; left: 50%; transform: translateX(-50%); border-radius: 15px 15px 10px 10px; border: 1px solid rgba(255,255,255,0.4); }

        /* Kati 1 - Blu e Errët me Shirit Ari */
        .layer1 { width: 280px; height: 90px; bottom: 0; background: linear-gradient(to right, #01579B, #0288D1, #01579B); z-index: 1; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .gold-ribbon { position: absolute; width: 100%; height: 10px; background: #FFD700; bottom: 15px; box-shadow: 0 0 10px #FFD700; }
        
        /* Kati 2 - Blu Mesatare me Perla */
        .layer2 { width: 210px; height: 85px; bottom: 90px; background: linear-gradient(to right, #0288D1, #29B6F6, #0288D1); z-index: 2; box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
        
        /* Kati 3 - Blu e Hapur me Shkëlqim */
        .layer3 { width: 140px; height: 80px; bottom: 175px; background: linear-gradient(to right, #29B6F6, #81D4FA, #29B6F6); z-index: 3; }
        .glaze { position: absolute; width: 100%; height: 100%; background: linear-gradient(transparent, rgba(255,255,255,0.3)); border-radius: 15px; }

        /* Perlat */
        .pearl-row { position: absolute; width: 100%; display: flex; justify-content: space-around; bottom: -5px; padding: 0 5px; }
        .pearl { width: 8px; height: 8px; background: radial-gradient(circle, #fff, #ddd); border-radius: 50%; box-shadow: 0 0 5px #fff; }

        /* Qirinjtë */
        .candle { position: absolute; width: 8px; height: 35px; background: linear-gradient(#fff, #FFEB3B); border-radius: 4px; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .candle::after { content: '🔥'; position: absolute; top: -22px; left: -5px; font-size: 18px; animation: flicker 0.5s infinite alternate; filter: drop-shadow(0 0 8px orange); }

        @keyframes flicker { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.3); opacity: 1; } }

        /* UI */
        h1 { font-size: 32px; font-weight: 900; color: #01579B; text-shadow: 2px 2px #B3E5FC; margin-bottom: 0; }
        .riddle-text { font-size: 1.3rem; min-height: 100px; margin: 25px 0; font-weight: bold; line-height: 1.5; color: #004d40; }
        input { padding: 15px; border-radius: 30px; border: 4px solid #81D4FA; width: 80%; text-align: center; font-size: 18px; outline: none; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); }
        button { margin-top: 20px; padding: 15px 60px; background: #01579B; color: white; border: none; border-radius: 35px; cursor: pointer; font-weight: bold; font-size: 20px; transition: 0.3s; }
        button:hover { background: #0277BD; transform: scale(1.05); }
        #status { height: 30px; margin-top: 15px; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>HBD OLEANDRA 💙</h1>
    <div style="font-size: 20px; font-weight: bold; color: #0288D1;">Happy 17th Birthday!</div>

    <div class="cake-area" id="cake">
        <div class="layer layer1">
            <div class="gold-ribbon"></div>
            <div class="pearl-row">
                <div class="pearl"></div><div class="pearl"></div><div class="pearl"></div><div class="pearl"></div><div class="pearl"></div>
            </div>
        </div>
        <div class="layer layer2">
            <div class="pearl-row">
                <div class="pearl"></div><div class="pearl"></div><div class="pearl"></div><div class="pearl"></div>
            </div>
        </div>
        <div class="layer layer3">
            <div class="glaze"></div>
        </div>
    </div>

    <div id="game-ui">
        <p><strong>Sfida <span id="count">1</span> / 17</strong></p>
        <div class="riddle-text" id="riddle-box"></div>
        <input type="text" id="answer" placeholder="Përgjigja këtu...">
        <br>
        <button onclick="checkAnswer()">DËRGO ✨</button>
        <p id="status"></p>
    </div>
</div>

<script>
    const riddles = [
        { q: "Kush është kunata e Lacianit?", a: "Oleandra" },
        { q: "Kujt ia shkuli floket Kaltra ne ekskursion?", a: "Oleandra" },
        { q: "Kush po mbush 17 vjeç sot?", a: "Oleandra" },
        { q: "Kush thotë gjithmonë 'nuk kam çfarë të vesh'?", a: "Oleandra" },
        { q: "Kush thotë gjithmonë: 'Hajd lem oret'?", a: "Oleandra" },
        { q: "Kush e ka besti Jonelën pas Kaltrës?", a: "Oleandra" },
        { q: "Kush e ka kacurrelat me te bukur?", a: "Oleandra" },
        { q: "Kush është çdo javë nga nëna?", a: "Oleandra" },
        { q: "Kush ka një zog me emrin \"Muti\"?", a: "Oleandra" },
        { q: "Kush është personi i perbashket qe Kaltra,Drilena dhe Meku duan shumë?", a: "Oleandra" },
        { q: "Kush ka numrin 7 brënda kasës së telefonit?", a: "Oleandra" },
        { q: "Kush meriton dhuratën më të bukur sot?", a: "Oleandra" },
        { q: "Kush është njeriu më i dashur që Drilena njeh pas Kaltres?", a: "Oleandra" },
        { q: "Kush e meriton tortën më të madhe në botë?", a: "Oleandra" },
        { q: "Kush thoshte që sa të hap instagram do hedh shum story ose foto dhe tani spo hedh asgje?", a: "Oleandra" },
        { q: "Kush i thot \"vruk\" Marielit?", a: "Oleandra" },
        { q: "Dhe pyetja finale: Kush është besti i Ermesit?", a: "Kaltra" }
    ];

    // Pozicionet e saktësuara sipas kërkesës tënde: 6, 5, 4, 2
    const candlePos = [
        // Kati 1 (6 qirinj): Pyetjet 1-6
        {l:40, b:40}, {l:90, b:35}, {l:140, b:30}, {l:190, b:30}, {l:240, b:35}, {l:290, b:40},
        // Kati 2 (5 qirinj): Pyetjet 7-11
        {l:90, b:125}, {l:130, b:120}, {l:175, b:120}, {l:215, b:125}, {l:255, b:135},
        // Kati 3 (4 qirinj): Pyetjet 12-15
        {l:130, b:210}, {l:160, b:205}, {l:195, b:205}, {l:225, b:210},
        // Maja (2 qirinj): Pyetja 16 dhe 17
        {l:160, b:265}, {l:195, b:265}
    ];

    let current = 0;

    function loadRiddle() {
        if (current < riddles.length) {
            document.getElementById('riddle-box').innerText = riddles[current].q;
            document.getElementById('count').innerText = current + 1;
        } else {
            document.getElementById('game-ui').innerHTML = "<h2 style='color:#01579B'>🎊 HAPPY BYTHËN TU JU 🎊</h2><p style='font-size:1.2rem'>QIRINJT U GJETËN KISHA LAQIT!!!!!!!!🥳💙</p>";
        }
    }

    function checkAnswer() {
        let val = document.getElementById('answer').value.trim();
        if (val.toLowerCase() === riddles[current].a.toLowerCase()) {
            const c = document.createElement('div');
            c.className = 'candle';
            c.style.left = candlePos[current].l + 'px';
            c.style.bottom = candlePos[current].b + 'px';
            document.getElementById('cake').appendChild(c);

            current++;
            document.getElementById('status').innerText = "Saktë! ✨";
            document.getElementById('status').style.color = "#00C853";
            document.getElementById('answer').value = "";
            loadRiddle();
        } else {
            document.getElementById('status').innerText = "Gabim! Provo përsëri... 👀";
            document.getElementById('status').style.color = "#D50000";
        }
    }
    loadRiddle();
</script>
</body>
</html>
